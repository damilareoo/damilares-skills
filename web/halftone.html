<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Halftone Prints</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0d0b;
      --card: #161512;
      --border: rgba(255,255,255,0.08);
      --ink: #4E2818;
      --text: #e8e4dd;
      --muted: rgba(232,228,221,0.45);
      --btn: rgba(255,255,255,0.07);
      --btn-hover: rgba(255,255,255,0.13);
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 24px 80px;
      gap: 0;
    }
    header {
      text-align: center;
      margin-bottom: 56px;
    }
    header h1 {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .grid {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .card svg {
      width: 200px;
      height: 260px;
      display: block;
    }
    .label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }
    button {
      background: var(--btn);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 18px;
      font-size: 12px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
    }
    button:hover { background: var(--btn-hover); }
    button.copied {
      color: #82c89a;
      border-color: rgba(130,200,154,0.3);
    }
  </style>
</head>
